server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Compress text-based assets on the fly.
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/javascript application/json image/svg+xml;

    # SPA: always fall back to index.html so client-side routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-lived caching for content-hashed build artifacts only.
    # (JSON/YAML calc data under assets/ is intentionally left uncached so a
    #  new release's item/monster data is picked up without a hard refresh.)
    location ~* \.(?:js|css|woff2?|ttf|eot|otf|svg|png|jpg|jpeg|gif|ico)$ {
        expires    7d;
        add_header Cache-Control "public";
    }
}
