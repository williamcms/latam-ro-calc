# Two profiles so the dev and prod containers never start by accident together:
#   Dev  (live reload):  docker compose --profile dev  up --build
#   Prod (nginx static): docker compose --profile prod up --build
services:
  # ---- Development: ng serve with hot module replacement -------------------
  dev:
    profiles: ["dev"]
    container_name: ro-calc-dev
    build:
      context: .
      target: dev
    ports:
      - "4200:4200"
    volumes:
      # Bind-mount source for live reload...
      - .:/app
      # ...but keep the container's Linux-built node_modules (esbuild binaries,
      # etc.) instead of shadowing them with the host's.
      - /app/node_modules
    # --poll: file-change detection for Windows/WSL2 bind mounts, where native
    #   inotify events from the host don't reach the container (enables hot reload).
    # ng serve uses the webpack dev server via the `build-webpack` target in
    #   angular.json (not the esbuild/Vite builder, whose HMR WebSocket can't
    #   traverse a reverse proxy). Webpack bundles the output, so the app renders
    #   both in a normal browser at http://localhost:4200 and through a proxy such
    #   as the in-chat Claude Preview. `ng build` (the prod image) still uses esbuild.
    command: npm start -- --poll 2000

  # ---- Production: build once, serve the static bundle with nginx ----------
  prod:
    profiles: ["prod"]
    container_name: ro-calc-prod
    build:
      context: .
      target: prod
    ports:
      # Host 8090 (8080 is commonly taken by other local services); container nginx :80
      - "8090:80"
